name: Daily Canadian Lobbyist Scrapers

on:
  schedule:
    # Triggers every day at 11:00 UTC (7:00 AM Toronto time)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Chromium Browser
      run: |
        playwright install chromium

    - name: Run Alberta Scraper
      continue-on-error: true
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: |
        python alberta/alberta_lobbyist_scraper.py

    - name: Run BC Scraper
      continue-on-error: true
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: |
        python bc/bc_lobbyist_scraper.py

    - name: Run Ontario Scraper
      continue-on-error: true
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: |
        python ontario/ontario_lobbyist_scraper.py

    - name: Run Saskatchewan Scraper
      continue-on-error: true
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: |
        python saskatchewan/saskatchewan_lobbyist_scraper.py

    - name: Run Manitoba Scraper
      continue-on-error: true
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: |
        python manitoba/manitoba_lobbyist_scraper.py

    - name: Run Quebec Scraper
      continue-on-error: true
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: |
        python quebec/quebec_lobbyist_scraper.py

    - name: Run New Brunswick Scraper
      continue-on-error: true
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: |
        python new_brunswick/new_brunswick_lobbyist_scraper.py

    - name: Run PEI Scraper
      continue-on-error: true
      env:
        SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      run: |
        python prince_edward_island/pei_lobbyist_scraper.py

    - name: Consolidate Recent and Active Filings
      run: |
        python consolidate_recent.py

    - name: Commit and Push Updated Databases
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # Pull latest changes to avoid conflicts in case of concurrent runs
        git pull --rebase origin main || true
        
        git add alberta/alberta_lobbyists_historical.csv
        git add bc/bc_lobbyists_historical.csv
        git add ontario/ontario_lobbyists_historical.csv
        git add saskatchewan/saskatchewan_lobbyists_historical.csv
        git add manitoba/manitoba_lobbyists_historical.csv
        git add quebec/quebec_lobbyists_historical.csv
        git add new_brunswick/new_brunswick_lobbyists_historical.csv
        git add prince_edward_island/prince_edward_island_lobbyists_historical.csv
        git add recent_lobbyists.csv
        
        git commit -m "Automated Daily Sync: Updated Alberta, BC, Ontario, Saskatchewan, Manitoba, Quebec, New Brunswick, PEI databases and consolidated recent feed" || true
        git push origin main || true
